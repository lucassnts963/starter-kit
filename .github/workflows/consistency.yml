name: consistency

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate skills & conventions
        run: node scripts/check-consistency.mjs
      - name: Verify changelog is up to date
        run: node scripts/update-changelog.mjs --check
      - name: Verify skills index is up to date
        run: node scripts/update-skills-index.mjs --check
